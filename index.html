<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moved to ocbnagpur.in | SB Enterprises</title>
  <meta name="description" content="SB Enterprises has moved to ocbnagpur.in — battery services in Nagpur.">
  <link rel="canonical" href="https://ocbnagpur.in">
  <meta name="theme-color" content="#2a3544">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a222c;
      --accent: #e8870f;
      --text: #1a2332;
      --muted: #4a5568;
    }

    html, body {
      min-height: 100%;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* Parallax backdrop */
    .parallax {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background: #2a3544;
    }

    .parallax__layer {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 120%;
      height: 120%;
      transform: translate(-50%, -50%);
      will-change: transform;
    }

    .parallax__layer img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 35%;
      display: block;
      pointer-events: none;
      user-select: none;
    }

    .parallax__layer--back img {
      filter: brightness(0.72) saturate(1) blur(2px);
      transform: scale(1.12);
    }

    .parallax__layer--mid img {
      filter: brightness(0.82) saturate(1.05);
      opacity: 0.95;
    }

    .parallax__layer--front img {
      filter: brightness(0.9) saturate(1.08);
      opacity: 0.7;
      mask-image: radial-gradient(ellipse 95% 85% at 50% 50%, black 35%, transparent 78%);
    }

    .parallax__shade {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse 70% 60% at 50% 45%, rgba(255, 255, 255, 0.08) 0%, rgba(30, 38, 50, 0.35) 100%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.06) 0%, rgba(26, 34, 44, 0.45) 100%);
    }

    .wrap {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem 4rem;
    }

    .card {
      max-width: 28rem;
      width: 100%;
      text-align: center;
      padding: 2.5rem 2rem;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(249, 148, 23, 0.35);
      border-radius: 1.25rem;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.18);
    }

    .badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    h1 {
      font-size: clamp(1.65rem, 5vw, 2.1rem);
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 1rem;
    }

    h1 span { color: var(--accent); }

    p {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 1.75rem;
      font-size: 1rem;
    }

    .btn {
      display: inline-block;
      padding: 0.95rem 1.75rem;
      font-size: 1.05rem;
      font-weight: 700;
      color: #1a1208;
      text-decoration: none;
      background: linear-gradient(180deg, #ffb84d, var(--accent));
      border-radius: 999px;
      box-shadow: 0 8px 28px rgba(249, 148, 23, 0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 36px rgba(249, 148, 23, 0.45);
    }

    .btn:active { transform: translateY(0); }

    .domain {
      display: block;
      margin-top: 0.35rem;
      font-size: 0.9rem;
      font-weight: 600;
      opacity: 0.85;
    }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 2;
      text-align: center;
      padding: 1rem;
      font-size: 0.75rem;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
      opacity: 0.9;
    }

    @media (prefers-reduced-motion: reduce) {
      .parallax__layer { transform: translate(-50%, -50%) !important; }
    }
  </style>
</head>
<body>
  <div class="parallax" aria-hidden="true">
    <div class="parallax__layer parallax__layer--back" data-depth="0.04">
      <img src="images/backdrop.jpg" alt="">
    </div>
    <div class="parallax__layer parallax__layer--mid" data-depth="0.08">
      <img src="images/backdrop.jpg" alt="">
    </div>
    <div class="parallax__layer parallax__layer--front" data-depth="0.14">
      <img src="images/backdrop.jpg" alt="">
    </div>
  </div>
  <div class="parallax__shade" aria-hidden="true"></div>

  <main class="wrap">
    <div class="card">
      <p class="badge">SB Enterprises · Nagpur</p>
      <h1>We've moved to<br><span>ocbnagpur.in</span></h1>
      <p>Our website has a new home. Visit us there for batteries, installation, and auto electrical services.</p>
      <a class="btn" href="https://ocbnagpur.in">
        Go to new site
        <span class="domain">ocbnagpur.in</span>
      </a>
    </div>
  </main>

  <footer>© <span id="y"></span> SB Enterprises</footer>

  <script>
    (function () {
      document.getElementById("y").textContent = new Date().getFullYear();

      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;

      var layers = document.querySelectorAll(".parallax__layer");
      var px = 0, py = 0, sy = 0;
      var raf = null;

      function render() {
        raf = null;
        layers.forEach(function (layer) {
          var d = parseFloat(layer.getAttribute("data-depth")) || 0.08;
          var tx = px * d * 55;
          var ty = py * d * 45 + sy * d * 0.35;
          layer.style.transform =
            "translate(calc(-50% + " + tx + "px), calc(-50% + " + ty + "px)) scale(" + (1 + d * 0.4) + ")";
        });
      }

      function schedule() {
        if (raf === null) raf = requestAnimationFrame(render);
      }

      window.addEventListener("pointermove", function (e) {
        var w = window.innerWidth || 1;
        var h = window.innerHeight || 1;
        px = (e.clientX / w - 0.5) * 2;
        py = (e.clientY / h - 0.5) * 2;
        schedule();
      }, { passive: true });

      window.addEventListener("scroll", function () {
        sy = window.scrollY || 0;
        schedule();
      }, { passive: true });

      schedule();
    })();
  </script>
</body>
</html>
